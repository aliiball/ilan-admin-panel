name: Storybook Pages

# Her main push'unda Storybook'u derleyip GitHub Pages'e yayınlar.
# CI doğrulama akışından (ci.yml) bilerek ayrı: deploy, testlerden bağımsız kalsın.
on:
  push:
    branches: [main]
  workflow_dispatch:

# actions/deploy-pages'in Pages'e yazması için gereken izinler.
permissions:
  contents: read
  pages: write
  id-token: write

# Aynı anda tek bir Pages yayını çalışır; arka arkaya push'ta sıraya sokulur.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Yayınla
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # packageManager alanı package.json'da sabit.
      - name: pnpm kurulumu
        uses: pnpm/action-setup@v6

      # Node sürümü .nvmrc'den; lokal ile CI ayrışmasın.
      - name: Node.js kurulumu
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Bağımlılıklar
        run: pnpm install --frozen-lockfile

      # Base path burada geçilir: project site alt yoldan servis edildiği için şart.
      - name: Storybook build
        run: pnpm build-storybook
        env:
          STORYBOOK_BASE_PATH: /ilan-admin-panel/

      - name: Pages yapılandırması
        uses: actions/configure-pages@v5

      - name: Artifact yükle
        uses: actions/upload-pages-artifact@v3
        with:
          path: storybook-static

      - name: Pages'e dağıt
        id: deployment
        uses: actions/deploy-pages@v4
